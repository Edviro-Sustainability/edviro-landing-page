<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edviro - Energy Dashboarding & Anomaly Detection for School Districts Personal</title>
  </head>
  <body class="is-site-loading">
    <canvas id="webgl"></canvas>
    <div id="site-loader" class="site-loader" role="status" aria-live="polite" aria-label="Loading site">
      <span class="site-loader__spinner" aria-hidden="true"></span>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
      Switch to dark
    </button>
    <main id="content">
      <section class="panel">
        <h1 class="title" aria-label="Save Your School Thousands">
          <span class="text-reveal-mask text-reveal-mask--lead">
            <span class="text-reveal-line text-reveal-line--lead">Save Your School</span>
          </span>
          <span class="text-reveal-mask text-reveal-mask--lead">
            <span class="text-reveal-line text-reveal-line--lead text-reveal-delay">Thousands</span>
          </span>
          <span class="text-reveal-mask text-reveal-mask--brand" aria-hidden="true">
            <span class="text-reveal-line text-reveal-line--brand">Edviro</span>
          </span>
          <span class="text-reveal-mask text-reveal-mask--subtitle" aria-hidden="true">
            <span class="text-reveal-line text-reveal-line--subtitle">Energy Management</span>
          </span>
        </h1>
      </section>
      <section class="panel">
        <h2>Objects can transition between sections</h2>
      </section>
      <section class="panel">
        <h2>Camera and lighting stay fully programmable</h2>
      </section>
      <section class="panel">
        <h2>Swap in your models, text, and interactions</h2>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
