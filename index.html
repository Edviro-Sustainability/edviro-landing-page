<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edviro - Energy Dashboarding & Anomaly Detection for School Districts Personal</title>
  </head>
  <body>
    <canvas id="webgl"></canvas>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
      Switch to dark
    </button>
    <main id="content">
      <section class="panel">
        <h1 class="hero-title" aria-label="Save Your School Thousands">
          <span class="text-reveal-mask">
            <span class="text-reveal-line">Save Your School</span>
          </span>
          <span class="text-reveal-mask">
            <span class="text-reveal-line text-reveal-delay">Thousands</span>
          </span>
        </h1>
      </section>
      <section class="panel">
        <h2>Objects can transition between sections</h2>
      </section>
      <section class="panel">
        <h2>Camera and lighting stay fully programmable</h2>
      </section>
      <section class="panel">
        <h2>Swap in your models, text, and interactions</h2>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
